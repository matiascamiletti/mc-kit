<p-popover #overlayPanel>
  <ng-container *ngTemplateOutlet="filterContent"></ng-container>
</p-popover>

<p-dialog #dialog [visible]="dialogVisible()" (visibleChange)="dialogVisible.set($event)" [modal]="true"
  [style]="{width: '90vw'}" [draggable]="false" [resizable]="false" [closeOnEscape]="true" [closable]="true">
  <ng-container *ngTemplateOutlet="filterContent"></ng-container>
</p-dialog>

<ng-template #filterContent>
  @if (filterStorage() != undefined) {

  @if (typePanel() === eTypePanel.ADVANCED) {
  <mc-advanced-filters-panel [filterStorage]="filterStorage()!" />
  } @else {
  <mc-quick-filter-panel [filterStorage]="filterStorage()!" />
  }

  }
</ng-template>
